name: CI/CD

on:
  push:
    branches: [master]
    paths-ignore:
      - 'k8s/**'
  pull_request:
    branches: [master]

env:
  BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/reporthub-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/reporthub-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update K8s manifests with new image tags
        if: github.event_name == 'push'
        run: |
          sed -i "s|image: .*/reporthub-backend:.*|image: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}|" k8s/backend/deployment.yaml
          sed -i "s|image: .*/reporthub-frontend:.*|image: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}|" k8s/frontend/deployment.yaml

      - name: Commit and push updated manifests
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/backend/deployment.yaml k8s/frontend/deployment.yaml
          git diff --staged --quiet || git commit -m "ci: update image tags to ${{ github.sha }}"
          git push
