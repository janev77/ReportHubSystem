apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: reporthub
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/janev77/ReportHubSystem.git
    targetRevision: master
    path: k8s
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: reporthub
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
