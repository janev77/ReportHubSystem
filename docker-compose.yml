services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: reporthub_app
    restart: unless-stopped
    ports:
      - "8000:80"
    env_file:
      - path: ./backend/.env.docker
        required: false
      - path: ./backend/.env.docker.example
        required: false
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    container_name: laravel_mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: laravel_db
      MYSQL_USER: laravel_user
      MYSQL_PASSWORD: password
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_LOGIN_URL: http://localhost:8000/login
    container_name: reporthub_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - app

volumes:
  mysql_data:
