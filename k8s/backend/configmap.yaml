apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: reporthub
data:
  APP_NAME: ReportHub
  APP_ENV: production
  APP_DEBUG: "false"
  APP_URL: http://reporthub.local
  FRONTEND_URL: http://reporthub.local
  APP_LOCALE: en
  APP_FALLBACK_LOCALE: en
  APP_FAKER_LOCALE: en_US
  APP_MAINTENANCE_DRIVER: file
  BCRYPT_ROUNDS: "12"
  LOG_CHANNEL: stack
  LOG_STACK: single
  LOG_LEVEL: debug
  DB_CONNECTION: mysql
  DB_HOST: mysql
  DB_PORT: "3306"
  DB_DATABASE: laravel_db
  DB_USERNAME: laravel_user
  SESSION_DRIVER: database
  SESSION_LIFETIME: "120"
  SESSION_ENCRYPT: "false"
  SESSION_PATH: /
  CACHE_STORE: database
  QUEUE_CONNECTION: sync
  FILESYSTEM_DISK: local
  BROADCAST_CONNECTION: log
  MAIL_MAILER: smtp
  MAIL_HOST: smtp.gmail.com
  MAIL_PORT: "587"
  MAIL_USERNAME: reportsystemcompany@gmail.com
  MAIL_ENCRYPTION: tls
  MAIL_FROM_ADDRESS: reportsystemcompany@gmail.com
  MAIL_FROM_NAME: ReportHub
