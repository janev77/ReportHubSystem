apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: reporthub-ingress
  namespace: reporthub
spec:
  ingressClassName: traefik
  rules:
    - host: reporthub.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
